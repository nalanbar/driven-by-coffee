<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Nabil Alanbar</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Driven by Coffee</a>
  <ul class="nav-links">
    <li><a href="work.html">Work</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><button class="theme-toggle" aria-label="Toggle theme"></button></li>
  </ul>
</nav>

<main class="contact-page">
  <h1>Get in touch.</h1>
  <p>
    Whether you want to talk photography, commission work,<br>
    or just say hello — reach out.
  </p>
  <a href="mailto:your@email.com" class="contact-link" id="contact-email">your@email.com</a>
</main>

<footer>
  &copy; <span id="year"></span> Nabil Alanbar
</footer>

<script src="js/main.js"></script>
<script>
  document.getElementById('year').textContent = new Date().getFullYear();
  fetch('_data/galleries.json')
    .then(r => r.json())
    .then(data => {
      const email = data.site.contact_email;
      const link = document.getElementById('contact-email');
      link.href = 'mailto:' + email;
      link.textContent = email;
    });
</script>
</body>
</html>
